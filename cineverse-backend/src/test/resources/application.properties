# ============================================================
#  application.properties — Test Configuration
#  Overrides main application.properties during tests
# ============================================================
#
#  Academic Insight:
#  Tests run in isolation — they should NOT need:
#  - A real PostgreSQL database
#  - A real RabbitMQ server
#  - Real Redis
#
#  Solutions:
#  - H2 in-memory database replaces PostgreSQL
#  - RabbitMQ auto-configuration is DISABLED
#  - Tests use Mockito to mock dependencies
# ============================================================

# ── Use H2 In-Memory Database (replaces PostgreSQL in tests) ──
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA — create schema from entities for H2 ─────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ── Disable RabbitMQ Auto-Configuration ──────────────────────
# This prevents "Connection refused: localhost:5672" errors in CI
# RabbitMQ is tested via Mockito mocks, not a real broker
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# ── Suppress unnecessary startup logging in tests ────────────
logging.level.root=WARN
logging.level.com.cineverse=INFO
