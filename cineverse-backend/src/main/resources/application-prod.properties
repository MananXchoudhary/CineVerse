# ============================================================
#  application-prod.properties — Production Configuration
#  Day 11: CI/CD & Cloud Deployment
# ============================================================
#
#  Academic Insight: Spring Profiles
#  Spring Boot supports multiple configuration profiles:
#    - application.properties           → default (dev)
#    - application-prod.properties      → production
#    - application-test.properties      → testing
#
#  Activate via: spring.profiles.active=prod
#  In Docker: set environment variable SPRING_PROFILES_ACTIVE=prod
#
#  Key Differences: Dev vs Production
#  ┌────────────────────────────────────────────────────────┐
#  │  Setting          │ Dev         │ Production            │
#  ├────────────────────────────────────────────────────────┤
#  │  DDL auto         │ create-drop │ validate              │
#  │  SQL logging      │ true        │ false (performance)   │
#  │  Error details    │ full        │ none (security)       │
#  │  Log level        │ DEBUG       │ WARN                  │
#  │  Connection pool  │ small       │ larger (HikariCP)     │
#  └────────────────────────────────────────────────────────┘
# ============================================================

# ── Application ──────────────────────────────────────────────
spring.application.name=booking-service
server.port=8080

# ── Production DataSource (injected from docker-compose env vars) ──
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP Connection Pool (Production tuning) ──────────────
# Academic Insight: Connection pools reuse DB connections
# instead of creating new ones (expensive) for each request
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate (Production settings) ────────────────────
# validate = Check schema matches entities (DON'T recreate/drop in production!)
# create-drop would DELETE all data on restart!
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false                           # Disable SQL logging (performance)
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Logging (Production: minimal, only warnings+errors) ───────
logging.level.root=WARN
logging.level.com.cineverse=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Production log format (JSON for log aggregation tools)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ── Security: Hide error details ──────────────────────────────
# Never expose stack traces in production responses
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# ── Actuator (Health monitoring) ──────────────────────────────
# Academic Insight: Actuator exposes health endpoints for
# load balancers and monitoring systems (Prometheus, Grafana)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ── CORS (Production: restrict to your domain) ────────────────
# In production, restrict to your actual domain name
# spring.web.cors.allowed-origins=https://yourdomain.com
