# ============================================================
#  application.properties — Spring Boot Configuration
#  Day 10: Docker & Containerization
# ============================================================
#
#  Academic Insight: Environment Variables
#  All credentials are injected via environment variables
#  (set in docker-compose.yml). Never hardcode secrets!
#
#  Pattern: ${ENV_VAR:default_value}
#  → Uses ENV_VAR if set, otherwise falls back to default_value
#  → Default values work for local development without Docker
# ============================================================

# ── Application Port ─────────────────────────────────────────
server.port=8080

# ── PostgreSQL DataSource (Docker: uses service name "postgres") ──
# In Docker Compose, services communicate via their service name,
# NOT localhost. "postgres" here refers to the postgres service in
# docker-compose.yml
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cineversedb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
# create-drop: recreates schema on each startup (good for dev/demo)
# In production, use: validate or none
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create-drop}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Application Name (used in logs + service discovery) ─────
spring.application.name=booking-service

# ── Logging ─────────────────────────────────────────────────
logging.level.com.cineverse=INFO
logging.level.org.springframework.web=INFO

# ── Day 08: RabbitMQ & Event-Driven Architecture ─────────────
# Connection: uses Docker service name "rabbitmq" when in container
# Falls back to localhost for local development
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Retry mechanism — if processing fails, retry before sending to DLQ
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=2000
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000
