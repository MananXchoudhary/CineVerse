# ============================================================
#  docker-compose.prod.yml — Production Docker Compose
#  Day 11: CI/CD & Cloud Deployment
# ============================================================
#
#  Academic Insight: Dev vs Production Compose
#  Development (docker-compose.yml):
#    - Builds images locally from source
#    - Mounts volumes for hot reload
#    - Uses lax settings
#
#  Production (docker-compose.prod.yml):
#    - Pulls pre-built images from DockerHub
#    - HTTPS enabled via Nginx SSL
#    - Production Spring profile active
#    - Resource limits set (prevent runaway containers)
#    - Healthchecks on all services
#    - Always-restart policies
#
#  Usage:
#    docker-compose -f docker-compose.prod.yml up -d
#
#  Full CI/CD Flow:
#  Developer Push → CI Tests → CD Builds Images → Push to DockerHub
#  → Server runs: docker-compose -f docker-compose.prod.yml pull
#               + docker-compose -f docker-compose.prod.yml up -d
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  # Nginx — Reverse Proxy + SSL Termination + Frontend Serve
  # Academic Insight: Nginx sits in front of ALL services.
  # Clients only talk to Nginx — never directly to backend.
  # ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cineverse-nginx-prod
    ports:
      - "80:80"       # HTTP → redirects to HTTPS
      - "443:443"     # HTTPS (SSL terminated here)
    volumes:
      # Production Nginx config with HTTPS
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      # React built files (served by Nginx directly)
      - frontend_dist:/usr/share/nginx/html:ro
      # SSL certificates (generated by generate-ssl.sh)
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - booking-service
      - frontend-builder
    networks:
      - cineverse-prod-network
    restart: always

  # ──────────────────────────────────────────────────────────
  # Frontend Builder — Builds React app, outputs to volume
  # (Runs once, then exits — Nginx serves the static files)
  # ──────────────────────────────────────────────────────────
  frontend-builder:
    image: ${DOCKERHUB_USERNAME:-yourusername}/cineverse-frontend:latest
    container_name: cineverse-frontend-builder
    volumes:
      - frontend_dist:/app/dist
    command: sh -c "cp -r /usr/share/nginx/html/. /app/dist/ && echo 'Frontend built'"
    networks:
      - cineverse-prod-network
    restart: "no"

  # ──────────────────────────────────────────────────────────
  # Booking Service — Spring Boot API (Production)
  # ──────────────────────────────────────────────────────────
  booking-service:
    # Pull pre-built image from DockerHub (not local build)
    image: ${DOCKERHUB_USERNAME:-yourusername}/cineverse-booking-service:latest
    container_name: cineverse-booking-service-prod
    environment:
      SPRING_PROFILES_ACTIVE: prod              # Activate production profile
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    # Resource limits (prevent OOM — Out of Memory kills)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cineverse-prod-network
    restart: always

  # ──────────────────────────────────────────────────────────
  # PostgreSQL — Production DB
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cineverse-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - cineverse-prod-network
    restart: always

  # ──────────────────────────────────────────────────────────
  # Redis — Production Cache
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cineverse-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_prod_pass}
    volumes:
      - redis_prod_data:/data
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - cineverse-prod-network
    restart: always

  # ──────────────────────────────────────────────────────────
  # RabbitMQ — Production Message Broker
  # ──────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-alpine     # No management UI in production
    container_name: cineverse-rabbitmq-prod
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_prod_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - cineverse-prod-network
    restart: always

  # ──────────────────────────────────────────────────────────
  # MongoDB — Production Document DB
  # ──────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: cineverse-mongodb-prod
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_prod_data:/data/db
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - cineverse-prod-network
    restart: always

# ── Named Volumes ──────────────────────────────────────────────
volumes:
  postgres_prod_data:
  redis_prod_data:
  rabbitmq_prod_data:
  mongo_prod_data:
  frontend_dist:

# ── Networks ───────────────────────────────────────────────────
networks:
  cineverse-prod-network:
    driver: bridge
