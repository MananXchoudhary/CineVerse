# ============================================================
#  nginx.conf — Nginx Configuration for React SPA
#  Day 10: Docker & Containerization
# ============================================================
#
#  Academic Insight: SPA Routing Problem
#  React Router handles routes client-side (/dashboard, /catalog).
#  Without this config, Nginx returns 404 for direct URL access.
#  Solution: All requests → serve index.html → React Router takes over.
# ============================================================

server {
    # Listen on port 80 (mapped to host in docker-compose.yml)
    listen 80;
    server_name localhost;

    # Root: where Nginx looks for files (our built React app)
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA Routing Fix ─────────────────────────────────────
    # try_files: Try the exact file first, then directory, then
    # fall back to index.html (React Router handles the rest)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Proxy ────────────────────────────────────────────
    # Forward /api/* requests to the booking-service container
    # "booking-service" = Docker Compose service name (internal DNS)
    location /api/ {
        proxy_pass http://booking-service:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Static Asset Caching ─────────────────────────────────
    # Cache JS/CSS/images for 1 year (they have content hashes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
