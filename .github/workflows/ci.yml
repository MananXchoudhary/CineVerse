# ============================================================
#  ci.yml — GitHub Actions CI Pipeline
#  Day 11: CI/CD & Cloud Deployment
# ============================================================
#
#  WHAT IS THIS FILE?
#  A GitHub Actions workflow that automatically runs every time
#  code is pushed to the "main" branch.
#
#  CI Flow:
#  Developer Push → GitHub Detects → Runner VM Starts →
#  Checkout Code → Setup Java → Build → Run Tests → Result
#
#  Academic Insight:
#  CI catches bugs EARLY — before they reach production.
#  "Fail fast" is the core principle: detect issues immediately.
#
#  Step-by-step Execution:
#  1. Trigger  — code pushed to branch "main"
#  2. Runner   — GitHub creates a fresh Ubuntu VM
#  3. Checkout — Downloads repository code
#  4. Java     — Installs Java 17 (Temurin/Eclipse)
#  5. Build    — Compiles entire project (mvn clean package)
#  6. Test     — Runs unit tests (JUnit + Mockito)
#  If any test FAILS → pipeline STOPS → developer gets notified
# ============================================================

name: CI Pipeline

# ── Trigger ──────────────────────────────────────────────────
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# ── Jobs ─────────────────────────────────────────────────────
jobs:

  # ── Job 1: Build and Test Backend (Spring Boot) ────────────
  build-and-test-backend:
    name: "Build & Test — Spring Boot Backend"
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Java 17
      # 'temurin' = Eclipse Temurin distribution
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      # Step 3: Build Project (compile only — tests run separately)
      # -DskipTests: skip test execution during package (faster build check)
      # This verifies the code COMPILES successfully
      - name: Build Project
        run: mvn clean package -DskipTests -B
        working-directory: cineverse-backend

      # Step 4: Run Unit Tests
      # Runs only unit tests (BookingServiceTest, BookingControllerTest)
      # Integration tests are excluded because they need a real DB
      # In production CI: use a test container or mock DB
      # Academic Insight: Unit tests run in isolation using Mockito mocks
      - name: Run Unit Tests
        run: mvn test -Dtest="BookingServiceTest,BookingControllerTest" -B
        working-directory: cineverse-backend

      # Step 5: Upload Test Reports
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: cineverse-backend/target/surefire-reports/

  # ── Job 2: Build Frontend (React/Vite) ─────────────────────
  build-frontend:
    name: "Build — React Frontend"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Node.js 20 (required by Vite 8)
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install all npm dependencies
      - name: Install Dependencies
        run: npm install
        working-directory: "DOMAIN CAMP"

      # Build the React app (Vite production build → dist/)
      # This verifies the frontend COMPILES and BUNDLES correctly
      - name: Build Frontend
        run: npm run build
        working-directory: "DOMAIN CAMP"

      # Upload built dist/ as artifact
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: "DOMAIN CAMP/dist/"

  # ── Job 3: Docker Compose Validation ──────────────────────
  validate-docker-compose:
    name: "Validate Docker Compose"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Validate docker-compose.yml syntax
      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet
        continue-on-error: true
