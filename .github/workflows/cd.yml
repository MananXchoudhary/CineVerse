# ============================================================
#  cd.yml — GitHub Actions CD Pipeline
#  Day 11: CI/CD & Cloud Deployment
# ============================================================
#
#  WHAT IS THIS FILE?
#  Continuous Deployment pipeline that runs ONLY after CI passes.
#  Builds Docker images and pushes them to DockerHub.
#
#  CD Flow:
#  CI Passes → Build Docker Images → Push to DockerHub →
#  Deploy to Cloud Server → Monitor
#
#  Academic Insight:
#  CD eliminates manual deployment. Every successful CI run
#  automatically produces a deployable Docker image.
#
#  Step-by-step Execution:
#  1. Trigger  — runs only AFTER "CI Pipeline" completes successfully
#  2. Checkout — Downloads repository code
#  3. Build    — Creates Docker images for backend + frontend
#  4. Login    — Authenticates with DockerHub registry
#  5. Push     — Uploads images to DockerHub (public/private registry)
#  6. Deploy   — Server pulls latest image and runs container
#
#  Prerequisites (set these in GitHub → Settings → Secrets):
#  - DOCKERHUB_USERNAME: your DockerHub username
#  - DOCKERHUB_TOKEN: DockerHub access token (not password!)
# ============================================================

name: CD Pipeline

# ── Trigger ──────────────────────────────────────────────────
# Run ONLY after CI Pipeline completes successfully
on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

  # Also allow manual trigger
  workflow_dispatch:

# ── Jobs ─────────────────────────────────────────────────────
jobs:

  # ── Job 1: Build & Push Backend Docker Image ───────────────
  build-and-push-backend:
    name: "Docker — Build & Push Backend"
    runs-on: ubuntu-latest

    # Only run if CI Pipeline SUCCEEDED (not just completed)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Docker Buildx for multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Login to DockerHub
      # Uses secrets stored in GitHub (never hardcode passwords!)
      # GitHub → Settings → Secrets and Variables → Actions
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Build and Push Backend Image
      # Tags: latest + git commit SHA (for rollback capability)
      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./cineverse-backend
          dockerfile: ./cineverse-backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cineverse-booking-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cineverse-booking-service:${{ github.sha }}
          cache-from: type=gha    # Use GitHub Actions cache for faster builds
          cache-to: type=gha,mode=max

  # ── Job 2: Build & Push Frontend Docker Image ──────────────
  build-and-push-frontend:
    name: "Docker — Build & Push Frontend"
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: "./DOMAIN CAMP"
          dockerfile: "./DOMAIN CAMP/Dockerfile"
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cineverse-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cineverse-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy (Simulated) ──────────────────────────────
  # Academic Insight: In a real setup, this step SSH's into a
  # cloud server (AWS EC2, Render, DigitalOcean) and runs:
  #   docker-compose pull && docker-compose up -d
  deploy:
    name: "Deploy to Cloud (Simulated)"
    runs-on: ubuntu-latest
    needs: [build-and-push-backend, build-and-push-frontend]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Simulated deployment step
      # In production: replace with SSH action + docker-compose pull
      - name: Deploy Application
        run: |
          echo "========================================"
          echo "  CINEVERSE DEPLOYMENT SUMMARY"
          echo "========================================"
          echo "Commit SHA  : ${{ github.sha }}"
          echo "Branch      : ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          echo ""
          echo "Images Built:"
          echo "  - cineverse-booking-service:latest"
          echo "  - cineverse-frontend:latest"
          echo ""
          echo "Deploying application..."
          echo ""
          echo "In production, this step would:"
          echo "  1. SSH into cloud server"
          echo "  2. docker-compose pull (get new images)"
          echo "  3. docker-compose up -d (restart with zero downtime)"
          echo ""
          echo "Deployment complete!"
          echo "========================================"

      # Create a GitHub Deployment record (visible in GitHub UI)
      - name: Create Deployment Status
        run: echo "Deployment of commit ${{ github.sha }} completed successfully"
