# ============================================================
#  nginx.prod.conf — Production Nginx Configuration
#  Day 11: CI/CD & Cloud Deployment
# ============================================================
#
#  Academic Insight: Reverse Proxy
#  NGINX sits between the client and backend services.
#  The client NEVER talks to Spring Boot directly.
#  Flow: Client → NGINX → Backend Services
#
#  Roles of NGINX here:
#  1. Serve React frontend (static files)
#  2. Reverse proxy /api/* → booking-service:8080
#  3. Force HTTPS (redirect HTTP → HTTPS)
#  4. Terminate SSL (decrypt HTTPS, forward plain HTTP internally)
#  5. Security headers
#  6. Gzip compression
#
#  HTTPS & SSL:
#  - SSL certificate verifies authenticity
#  - Encrypts all traffic between browser and server
#  - HTTPS is MANDATORY in production-grade systems
# ============================================================

# ── HTTP Server (Port 80) ────────────────────────────────────
# ONLY purpose: redirect all traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;       # Matches any hostname

    # 301 = Permanent redirect
    # All HTTP traffic → HTTPS (academic concept: force encryption)
    return 301 https://$host$request_uri;
}


# ── HTTPS Server (Port 443) ─────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # ── SSL Certificate Configuration ─────────────────────────
    # Academic Insight:
    # ssl_certificate     = Public certificate (sent to browser)
    # ssl_certificate_key = Private key (NEVER share this!)
    # In production: use Let's Encrypt (free) or a CA-signed cert
    ssl_certificate     /etc/nginx/ssl/cineverse.crt;
    ssl_certificate_key /etc/nginx/ssl/cineverse.key;

    # ── Modern SSL Settings ────────────────────────────────────
    # Only allow TLS 1.2 and 1.3 (older versions are insecure)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security Headers ───────────────────────────────────────
    # Prevents common web attacks:
    add_header X-Frame-Options "SAMEORIGIN" always;         # Prevent clickjacking
    add_header X-Content-Type-Options "nosniff" always;     # Prevent MIME-type sniffing
    add_header X-XSS-Protection "1; mode=block" always;     # XSS filter
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # Force HTTPS for 1 year

    # Root: React app dist folder
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip Compression ──────────────────────────────────────
    # Compress responses → faster load times
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── API Reverse Proxy ─────────────────────────────────────
    # Route /api/* → Spring Boot booking-service
    # "booking-service" = Docker Compose service name (internal DNS)
    # Client NEVER knows about port 8080 — NGINX abstracts it
    location /api/ {
        proxy_pass http://booking-service:8080/;

        # Forward real client info to backend
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # CORS headers for API
        add_header Access-Control-Allow-Origin  "https://$host" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # ── React SPA Routing ──────────────────────────────────────
    # All routes → index.html → React Router handles client-side
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Asset Caching ───────────────────────────────────
    # Vite adds content hashes to filenames → safe to cache 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;   # Don't log every static asset request
    }

    # ── Health Check Endpoint ──────────────────────────────────
    # Used by load balancers to verify server is alive
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"cineverse-frontend"}';
        add_header Content-Type application/json;
    }

    # ── Error Pages ────────────────────────────────────────────
    error_page 404 /index.html;       # SPA: React handles 404
    error_page 500 502 503 504 /50x.html;
}
